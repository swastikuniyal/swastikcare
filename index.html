<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swastik Care | Home Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mobile-frame">
        <div class="container">
            <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-top: 10px;">
                <div class="user-info">
                    <p style="color: #888; font-size: 14px; margin: 0;">Hello,</p>
                    <h3 id="patientNameDisplay" style="margin: 0; color: var(--secondary-blue); text-transform: capitalize;">Patient</h3>
                </div>
                <div class="profile-pic" onclick="location.href='Profile-Settings.html'" style="width: 45px; height: 45px; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                    <i class="fa fa-user" style="color: #666;"></i>
                </div>
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                <div class="card blue" onclick="location.href='Appointment-Booking.html'">
                    <i class="fa fa-calendar-check"></i>
                    <span>Book Appointment</span>
                </div>
                <div class="card orange" onclick="location.href='Health-Records.html'">
                    <i class="fa fa-folder-open"></i>
                    <span>Health Records</span>
                </div>
                <div class="card green" onclick="location.href='Talk-To-Doctor.html'">
                    <i class="fa fa-comment-medical"></i>
                    <span>Talk to Doctor</span>
                </div>
                <div class="card purple" onclick="location.href='My-Journey.html'">
                    <i class="fa fa-walking"></i>
                    <span>MoveOn Journey</span>
                </div>
            </div>

            <div class="vitals-widget" onclick="location.href='Vitals-Summary.html'" style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                    <h4 style="margin: 0; font-size: 15px;">Health Vitals Summary</h4>
                    <i class="fa fa-chevron-right" style="color: #ccc; font-size: 12px;"></i>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="font-size: 14px; color: #555;"><i class="fa fa-heart" style="color: #e74c3c; margin-right: 5px;"></i> Heart Rate: <b>72 bpm</b></span>
                    <span style="font-size: 14px; color: #555;"><i class="fa fa-tint" style="color: #3498db; margin-right: 5px;"></i> BP: <b>120/80</b></span>
                </div>
            </div>

            <div class="promo-banner" style="background: linear-gradient(135deg, var(--primary-teal), #1a237e); color: white; padding: 18px; border-radius: 15px; margin-bottom: 20px;">
                <h4 style="margin-bottom: 5px;">Move On Stronger</h4>
                <p style="font-size: 12px; opacity: 0.9;">Your recovery is 65% complete. View your tasks.</p>
            </div>
            
            <div class="card" style="width: 100%; padding: 15px; text-align: center; border: 1px solid #ddd;" onclick="location.href='Support.html'">
                <span style="color: #666;"><i class="fa fa-headset"></i> Need Help? Contact Support</span>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="location.href='index.html'"><i class="fa fa-home"></i></div>
            <div class="nav-item" onclick="location.href='Appointment-Booking.html'"><i class="fa fa-calendar-alt"></i></div>
            <div class="nav-item" onclick="location.href='Notifications.html'"><i class="fa fa-bell"></i></div>
            <div class="nav-item" onclick="location.href='Profile-Settings.html'"><i class="fa fa-user-cog"></i></div>
        </nav>
    </div>

    <script>
        // Check if user is logged in
        window.onload = function() {
            const userName = localStorage.getItem("patientName");
            
            if (!userName) {
                // Agar user logged in nahi hai toh Login page par bhejein
                window.location.href = "Login.html";
            } else {
                // Dashboard par patient ka naam dikhayein
                document.getElementById("patientNameDisplay").innerText = userName;
            }
        };
    </script>
</body>
</html>
