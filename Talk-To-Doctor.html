<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk to Doctor - Swastik Care</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Chat UI Specific Styles */
        .chat-header {
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .dr-status {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f4f7f6;
            height: calc(100% - 150px);
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .msg-doctor {
            background: white;
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .msg-patient {
            background: var(--primary-teal);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input-area {
            position: absolute;
            bottom: 75px; /* Above Bottom Nav */
            width: 100%;
            background: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        .msg-input {
            flex: 1;
            border: 1px solid #edf2f7;
            padding: 12px 15px;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            background: #f8fafc;
        }

        .send-btn {
            background: var(--primary-teal);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="mobile-frame">
        <div class="chat-header">
            <i class="fa fa-arrow-left" onclick="location.href='index.html'" style="cursor: pointer;"></i>
            <div style="position: relative;">
                <div style="width: 40px; height: 40px; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px;">👨‍⚕️</div>
                <div class="dr-status"></div>
            </div>
            <div>
                <h4 style="margin: 0; font-size: 15px;">Dr. Shalih</h4>
                <p style="margin: 0; font-size: 11px; color: #2ecc71; font-weight: 600;">Online Now</p>
            </div>
            <i class="fa fa-phone" style="margin-left: auto; color: var(--primary-teal); cursor: pointer;"></i>
        </div>

        <div class="chat-messages" id="chatBox">
            <div class="message msg-doctor">
                Hello! I reviewed your latest vitals. How are you feeling today?
            </div>
            <div class="message msg-patient">
                I'm feeling much better, doctor. The knee pain has reduced significantly.
            </div>
            <div class="message msg-doctor">
                That's great news. Please continue the Phase 1 exercises in your journey tab.
            </div>
        </div>

        <div class="chat-input-area">
            <i class="fa fa-plus-circle" style="color: #cbd5e0; font-size: 20px; cursor: pointer;"></i>
            <input type="text" id="msgInput" class="msg-input" placeholder="Type a message...">
            <button class="send-btn" onclick="sendMessage()">
                <i class="fa fa-paper-plane"></i>
            </button>
        </div>

        <nav class="navbar">
            <a onclick="location.href='index.html'" class="nav-item"><i class="fa fa-home"></i></a>
            <a onclick="location.href='Appointment-Booking.html'" class="nav-item"><i class="fa fa-calendar-plus"></i></a>
            <a onclick="location.href='Notifications.html'" class="nav-item"><i class="fa fa-bell"></i></a>
            <a onclick="location.href='Profile-Settings.html'" class="nav-item"><i class="fa fa-user-cog"></i></a>
        </nav>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const chatBox = document.getElementById('chatBox');
            
            if (input.value.trim() !== "") {
                const newMsg = document.createElement('div');
                newMsg.className = 'message msg-patient';
                newMsg.innerText = input.value;
                chatBox.appendChild(newMsg);
                
                input.value = "";
                // Auto scroll to bottom
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Allow 'Enter' key to send
        document.getElementById('msgInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
